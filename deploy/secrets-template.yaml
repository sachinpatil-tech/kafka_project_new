# ============================================================
# One-time secrets (apply once per namespace).
# Replace placeholder values before applying.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: kafka-creds
  namespace: lakehouse-ingest
type: Opaque
stringData:
  password: "REPLACE_WITH_KAFKA_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-creds
  namespace: lakehouse-ingest
type: Opaque
stringData:
  secret-key: "REPLACE_WITH_MINIO_SECRET"
---
apiVersion: v1
kind: Secret
metadata:
  name: pg-creds
  namespace: lakehouse-ingest
type: Opaque
stringData:
  password.properties: |
    password=REPLACE_WITH_POSTGRES_PASSWORD
